<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mia 単語帳</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #faf5ff;
      color: #1f2937;
    }

    header {
      background: #7c3aed;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 {
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }

    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 10px;
      text-align: center;
    }
    .status.ok {
      background: #dcfce7;
      color: #16a34a;
    }
    .status.none {
      background: #fef9c3;
      color: #854d0e;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #6b21a8;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      font-size: 11px;
      font-family: monospace;
      padding: 8px 10px;
      border: 1.5px solid #d8b4fe;
      border-radius: 10px;
      background: #fff;
      outline: none;
      color: #1f2937;
    }
    input:focus {
      border-color: #7c3aed;
    }

    .hint {
      font-size: 10px;
      color: #9ca3af;
      margin-top: 4px;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #c4b5fd; cursor: not-allowed; }

    .error {
      font-size: 11px;
      color: #dc2626;
      text-align: center;
    }
    .saved {
      font-size: 11px;
      color: #16a34a;
      text-align: center;
    }

    .clear-link {
      font-size: 10px;
      color: #9ca3af;
      text-align: right;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      padding: 0;
      width: auto;
    }
    .clear-link:hover { color: #ef4444; background: none; }
  </style>
</head>
<body>
  <header>
    <h1>Mia 単語帳</h1>
  </header>
  <div class="body">
    <div id="status" class="status none">連携コード未設定</div>

    <div>
      <label for="code-input">連携コード</label>
      <input
        id="code-input"
        type="text"
        placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        spellcheck="false"
        autocomplete="off"
      />
      <p class="hint">
        Miaのチャット画面 → 同期アイコン → 「このデバイスのコード」をコピーして貼り付けてください
      </p>
    </div>

    <div id="error" class="error" style="display:none"></div>
    <div id="saved" class="saved" style="display:none"></div>

    <button id="save-btn">保存する</button>
    <button id="clear-btn" class="clear-link">連携を解除する</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
